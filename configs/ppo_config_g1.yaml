# PPO Configuration

# Training
total_timesteps: 10000000
seed: 42

# Environment
num_envs: 16
num_stack: 4
frame_skip: 2
max_offroad_seconds: 2.0
offroad_penalty: null
discrete: true 
reward_shaping: true

# PPO Hyperparameters
num_steps: 256
num_minibatches: 8
update_epochs: 8
learning_rate: 0.0001
gamma: 0.99
gae_lambda: 0.95
clip_coef: 0.2
ent_coef: 0.01
value_coef: 0.5
max_grad_norm: 0.5
target_kl: null

# Device
device: auto
torch_deterministic: false

# Evaluation
eval_episodes: 5
eval_interval: 5
no_eval: false

# Checkpointing
save_interval: 50

# Video Recording
video_interval_minutes: 10.0
max_video_steps: 1000
no_video: false

# Resume
resume: null
