# PPO Configuration - Example

# Training
total_timesteps: 5000000
seed: 42

# Environment
num_envs: 4
num_stack: 4
frame_skip: 4
max_offroad_seconds: 2.0
offroad_penalty: null
discrete: true 
reward_shaping: true

# PPO Hyperparameters
num_steps: 512
num_minibatches: 4
update_epochs: 10
learning_rate: 0.0001
use_lr_scheduler: true
lr_end: 0.000001
gamma: 0.99
gae_lambda: 0.95
clip_coef: 0.2
ent_coef: 0.01
value_coef: 0.5
max_grad_norm: 0.5
target_kl: null

# Device
device: auto
torch_deterministic: false

# Evaluation
eval_episodes: 5
eval_interval: 50
no_eval: false

# Checkpointing
save_interval: 50

# Video Recording
video_interval_minutes: 10.0
max_video_steps: 1000
no_video: false

# Resume
resume: null
